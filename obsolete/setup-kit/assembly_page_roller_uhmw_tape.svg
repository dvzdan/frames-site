<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Apply UHMW tape to roller ridges</title>
  <desc id="desc">Cut three pieces of UHMW tape and apply them over the three raised ridges on the Roller.</desc>
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="tapeBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3e8af6"/>
      <stop offset="1" stop-color="#1261d8"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="1100" fill="#f6f2ee"/>

  <g id="part-cards">
    <g transform="translate(48 70)" filter="url(#cardShadow)">
      <rect width="290" height="300" rx="16" fill="#ffffff" stroke="#d6d6d6"/>
      <image href="roller.png" x="34" y="26" width="222" height="205" preserveAspectRatio="xMidYMid meet"/>
      <text x="145" y="262" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#111111">Roller</text>
    </g>
    <g transform="translate(48 410)" filter="url(#cardShadow)">
      <rect width="290" height="300" rx="16" fill="#ffffff" stroke="#d6d6d6"/>
      <image href="uhmw-tape.png" x="34" y="26" width="222" height="205" preserveAspectRatio="xMidYMid meet"/>
      <text x="145" y="262" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#111111">UHMW tape</text>
    </g>
  </g>

  <g id="main-assembly">
    <image href="assembly_step_roller_uhmw_ridges.png" x="386" y="100" width="1120" height="640" preserveAspectRatio="xMidYMid meet"/>

    <g id="tape-overlays" stroke="#0b4faa" stroke-width="3.5" stroke-linejoin="round">
      <polygon points="739,338 829,361 829,452 739,427" fill="url(#tapeBlue)" opacity="0.9"/>
      <polygon points="750,350 815,367 815,384 750,366" fill="#ffffff" opacity="0.18" stroke="none"/>

      <polygon points="891,388 984,416 984,462 891,433" fill="url(#tapeBlue)" opacity="0.88"/>
      <polygon points="902,400 968,420 968,436 902,416" fill="#ffffff" opacity="0.16" stroke="none"/>
      <polygon points="891,433 984,462 984,535 891,506" fill="#2b74e8" opacity="0.18" stroke="none"/>

      <polygon points="930,300 1018,326 1018,380 930,354" fill="url(#tapeBlue)" opacity="0.74"/>
      <polygon points="940,312 1004,331 1004,345 940,326" fill="#ffffff" opacity="0.18" stroke="none"/>
    </g>

    <g id="state-bubbles" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" text-anchor="middle">
      <circle cx="791" cy="316" r="25" fill="#ffffff" stroke="#222222" stroke-width="3"/>
      <text x="791" y="326" fill="#111111">1</text>
      <circle cx="988" cy="292" r="25" fill="#ffffff" stroke="#222222" stroke-width="3"/>
      <text x="988" y="302" fill="#111111">2</text>
      <circle cx="1117" cy="400" r="25" fill="#ffffff" stroke="#222222" stroke-width="3"/>
      <text x="1117" y="410" fill="#111111">3</text>
    </g>

    <g id="motion-indicator" fill="none" stroke="#222222" stroke-linecap="round" stroke-linejoin="round" stroke-width="9">
      <path d="M1002 335 C984 354 970 372 957 395"/>
      <path d="M951 367 L958 397 L984 380"/>
      <path d="M1018 336 l-16 16 l-10 -20" stroke-width="6.5" opacity="0.72"/>
      <path d="M1000 356 l-16 16 l-10 -20" stroke-width="6.5" opacity="0.72"/>
    </g>
  </g>

  <g id="caption" transform="translate(195 840)" filter="url(#cardShadow)">
    <rect width="1210" height="190" rx="18" fill="#ffffff" stroke="#d6d6d6"/>
    <text x="605" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" fill="#111111">
      <tspan font-weight="700">Cut</tspan>
      <tspan> three pieces of </tspan>
      <tspan fill="#1261d8" font-weight="700">UHMW tape</tspan>
      <tspan>. Cover the </tspan>
      <tspan fill="#d08300" font-weight="700">three raised ridges</tspan>
      <tspan>.</tspan>
    </text>
    <text x="605" y="136" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" fill="#111111">
      <tspan>Keep the </tspan>
      <tspan fill="#777775" font-weight="700">Roller</tspan>
      <tspan> smooth. Friction is the enemy.</tspan>
    </text>
  </g>
</svg>
